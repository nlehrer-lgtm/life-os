<!doctype html>
<html><head><meta charset="utf-8"><title>Voice & Tone</title>
<link rel="stylesheet" href="_card.css">
<style>
  .grid { display:grid; grid-template-columns: 1fr 1fr; gap:14px; }
  .box { padding: 16px; }
  .do { background:#F2F2F0; border-left: 4px solid #27AE60; }
  .dont { background:#F2F2F0; border-left: 4px solid #C0392B; }
  .tag { font-family:var(--font-heading); font-weight:700; font-size:11px; letter-spacing:0.14em; text-transform:uppercase; margin-bottom:8px; }
  .do .tag { color:#27AE60; }
  .dont .tag { color:#C0392B; }
  .quote { font-family:var(--font-display); font-size:22px; line-height:1.05; text-transform:uppercase; color:#221E1F; }
  .dont .quote { color:#888; }
  .sub { font-family:var(--font-body); font-size:12px; color:#4A4A4A; margin-top:6px; }
</style></head>
<body>
<div class="card" style="padding:24px;">
  <div class="grid">
    <div class="box do">
      <div class="tag">Do</div>
      <div class="quote">We show up. We shoot. We post.</div>
      <div class="sub">Short. Active voice. Direct.</div>
    </div>
    <div class="box dont">
      <div class="tag">Don't</div>
      <div class="quote">Leverage our synergistic content solutions</div>
      <div class="sub">No buzzwords, no jargon, no fluff.</div>
    </div>
    <div class="box do">
      <div class="tag">Do</div>
      <div class="quote">Your shop. Your crew. Your content.</div>
      <div class="sub">Second person. Speak to the client.</div>
    </div>
    <div class="box dont">
      <div class="tag">Don't</div>
      <div class="quote">Content will be captured by our team</div>
      <div class="sub">Passive voice; corporate distance.</div>
    </div>
  </div>
</div>
</body></html>
