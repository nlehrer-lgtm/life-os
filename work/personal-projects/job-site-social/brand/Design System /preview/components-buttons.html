<!doctype html>
<html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="_card.css">
<style>
  .row { display:flex; gap: 14px; align-items:center; flex-wrap:wrap; }
  .btn {
    display:inline-flex; align-items:center; gap:10px; padding:14px 32px;
    font-family: var(--font-heading); font-weight: 600; font-size: 14px;
    text-transform: uppercase; letter-spacing: 0.08em; border-radius: 0;
    border:none; cursor:pointer; line-height:1;
  }
  .primary { background:#F4C046; color:#221E1F; }
  .primary.hover { background:#F7CE6A; }
  .primary.active { background:#D9A52E; }
  .secondary { background:transparent; color:#221E1F; border:2px solid #221E1F; padding:12px 30px; }
  .dark { background:#221E1F; color:#fff; }
  .ondark { background:transparent; color:#fff; border:2px solid #fff; padding:12px 30px; }
  .lbl { font-family: ui-monospace, Menlo, monospace; font-size: 10px; color:#888; margin-top:4px; }
</style></head>
<body>
<div class="card" style="padding:24px; gap:18px;">
  <div>
    <div class="row">
      <div><button class="btn primary">Subscribe Now</button><div class="lbl">Primary · default</div></div>
      <div><button class="btn primary hover">Subscribe Now</button><div class="lbl">Hover · #F7CE6A</div></div>
      <div><button class="btn primary active">Subscribe Now</button><div class="lbl">Active · #D9A52E</div></div>
    </div>
  </div>
  <div class="row">
    <div><button class="btn secondary">See Pricing</button><div class="lbl">Secondary on light</div></div>
    <div><button class="btn dark">Get Started</button><div class="lbl">Dark solid</div></div>
  </div>
  <div style="background:#000; padding:16px; margin:0 -24px -24px;">
    <div class="row">
      <button class="btn primary">Book a Call</button>
      <button class="btn ondark">View Work</button>
    </div>
  </div>
</div>
</body></html>
