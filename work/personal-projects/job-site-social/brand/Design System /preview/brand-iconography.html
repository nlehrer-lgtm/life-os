<!doctype html>
<html><head><meta charset="utf-8"><title>Iconography</title>
<link rel="stylesheet" href="_card.css">
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<style>
  .icons { display:grid; grid-template-columns: repeat(8, 1fr); gap: 14px; align-items: center; justify-items: center; }
  .iw { width: 48px; height: 48px; display:flex; align-items:center; justify-content:center; background:#221E1F; color:#fff; }
  .iw.gold { background:#F4C046; color:#221E1F; }
  .iw.ghost { background:transparent; color:#221E1F; border:2px solid #221E1F; }
  .stroke { stroke-width: 2.5; }
  .legend { display:flex; gap:18px; flex-wrap:wrap; align-items:center; }
  .lg-item { display:flex; align-items:center; gap:8px; font-family:var(--font-body); font-size:12px; color:#4A4A4A; }
</style></head>
<body>
<div class="card" style="padding:24px; gap:14px;">
  <div class="label">Lucide · stroke 2.5 · bold &amp; geometric</div>
  <div class="icons">
    <div class="iw"><i data-lucide="camera"></i></div>
    <div class="iw"><i data-lucide="video"></i></div>
    <div class="iw"><i data-lucide="hammer"></i></div>
    <div class="iw"><i data-lucide="wrench"></i></div>
    <div class="iw gold"><i data-lucide="check"></i></div>
    <div class="iw gold"><i data-lucide="map-pin"></i></div>
    <div class="iw ghost"><i data-lucide="calendar"></i></div>
    <div class="iw ghost"><i data-lucide="instagram"></i></div>
  </div>
  <div class="legend">
    <div class="lg-item">No outline-only thin sets · no emoji</div>
  </div>
</div>
<script>
  if (window.lucide) lucide.createIcons({ attrs: { 'stroke-width': 2.5, width: 22, height: 22 } });
</script>
</body></html>
