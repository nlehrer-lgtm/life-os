<!doctype html>
<html><head><meta charset="utf-8"><title>Nav & Footer</title>
<link rel="stylesheet" href="_card.css">
<style>
  .nav { background:#fff; padding:14px 20px; display:flex; justify-content:space-between; align-items:center; gap:16px; border-bottom: 1px solid #D4D4D4; }
  .logo { height: 22px; }
  .links { display:flex; gap:22px; }
  .links a { font-family:var(--font-heading); font-weight:500; font-size:13px; letter-spacing:0.08em; text-transform:uppercase; color:#221E1F; text-decoration:none; }
  .links a.active { color:#D9A52E; }
  .cta { background:#F4C046; color:#221E1F; padding:9px 18px; font-family:var(--font-heading); font-weight:600; font-size:12px; letter-spacing:0.1em; text-transform:uppercase; }
  .footer { background:#F2F2F0; color:#221E1F; padding:18px 20px; display:flex; justify-content:space-between; align-items:center; border-top: 1px solid #D4D4D4; }
  .ft-eyebrow { font-family:var(--font-heading); font-weight:600; font-size:11px; letter-spacing:0.16em; text-transform:uppercase; color:#D9A52E; }
  .ft-meta { font-family:var(--font-body); font-size:12px; color:#888; }
</style></head>
<body>
<div class="card" style="padding:0; background:#fff;">
  <div class="nav">
    <img class="logo" src="../assets/logo-tight.png" alt="Jobsite Social" />
    <div class="links">
      <a href="#">Work</a>
      <a href="#">How It Works</a>
      <a href="#" class="active">Pricing</a>
      <a href="#">About</a>
    </div>
    <div class="cta">Subscribe</div>
  </div>
  <div style="height:24px; background:#F2F2F0;"></div>
  <div class="footer">
    <div>
      <div class="ft-eyebrow">Franklin, TN · Spring Hill, TN</div>
      <div class="ft-meta" style="margin-top:4px;">© 2025 Jobsite Social</div>
    </div>
    <div class="ft-meta">Instagram · Facebook · TikTok</div>
  </div>
</div>
</body></html>
