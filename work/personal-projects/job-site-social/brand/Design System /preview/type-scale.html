<!doctype html>
<html><head><meta charset="utf-8"><title>Type Scale</title>
<link rel="stylesheet" href="_card.css">
<style>
  table { border-collapse: collapse; width: 100%; font-family: var(--font-body); }
  td { padding: 10px 0; border-bottom: 1px solid #D4D4D4; vertical-align: baseline; }
  td:first-child { color: #888; font-family: ui-monospace, Menlo, monospace; font-size: 11px; width: 130px; }
  td:nth-child(2) { color: #888; font-family: ui-monospace, Menlo, monospace; font-size: 11px; width: 70px; }
</style></head>
<body>
<div class="card" style="padding:24px;">
  <table>
    <tr><td>H1 Bebas</td><td>72px</td><td style="font-family:var(--font-display); font-size:48px; text-transform:uppercase; line-height:1;">REAL WORK</td></tr>
    <tr><td>H2 Oswald 700</td><td>40px</td><td style="font-family:var(--font-heading); font-weight:700; font-size:30px; text-transform:uppercase;">Show up &amp; shoot</td></tr>
    <tr><td>H3 Oswald 600</td><td>28px</td><td style="font-family:var(--font-heading); font-weight:600; font-size:22px;">Recommended package</td></tr>
    <tr><td>Body 400</td><td>16px</td><td style="font-family:var(--font-body); font-size:16px; color:#4A4A4A;">Hand it off and get back to work.</td></tr>
    <tr><td>Caption 400</td><td>13px</td><td style="font-family:var(--font-body); font-size:13px; color:#888;">Photo by Jobsite Social · 2025</td></tr>
  </table>
</div>
</body></html>
