<!doctype html>
<html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="_card.css">
<style>
  .demo { display:flex; gap:18px; align-items:flex-end; }
  .r { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .box { width:120px; height:120px; background:#221E1F; }
  .nm { font-family:var(--font-heading); font-weight:600; font-size:13px; }
  .v { font-family: ui-monospace, Menlo, monospace; font-size:11px; color:#888; }
</style></head>
<body>
<div class="card" style="padding:24px;">
  <div class="label">Radii · sharp on purpose</div>
  <div class="demo" style="margin-top:12px;">
    <div class="r"><div class="box" style="border-radius:0px;"></div><div class="nm">None · default</div><div class="v">0px</div></div>
    <div class="r"><div class="box" style="border-radius:2px; background:#4A4A4A;"></div><div class="nm">Sm</div><div class="v">2px</div></div>
    <div class="r"><div class="box" style="border-radius:4px; background:#888;"></div><div class="nm">Md · max</div><div class="v">4px</div></div>
    <div class="r" style="opacity:0.4; filter:grayscale(1);"><div class="box" style="border-radius:24px; background:#C0392B;"></div><div class="nm" style="color:#C0392B;">Never</div><div class="v">24px+</div></div>
  </div>
  <div style="font-family:var(--font-body); font-size:13px; color:#888; margin-top:10px;">Industrial = flat. Sharp corners are the brand.</div>
</div>
</body></html>
