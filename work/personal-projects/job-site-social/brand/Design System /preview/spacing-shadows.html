<!doctype html>
<html><head><meta charset="utf-8"><title>Shadows</title>
<link rel="stylesheet" href="_card.css">
<style>
  .grid { display:grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
  .s { background:#fff; aspect-ratio: 1 / 0.8; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; }
  .nm { font-family:var(--font-heading); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:0.08em; }
  .v { font-family: ui-monospace, Menlo, monospace; font-size:10px; color:#888; }
</style></head>
<body>
<div class="card" style="padding:28px; background:#F2F2F0; gap:12px;">
  <div class="label">Shadow system · subtle, flat</div>
  <div class="grid">
    <div class="s" style="border:1px solid #D4D4D4;"><div class="nm">None</div><div class="v">flat</div></div>
    <div class="s" style="box-shadow:0 1px 0 rgba(0,0,0,0.04);"><div class="nm">Flat</div><div class="v">0 1px 0 / 4%</div></div>
    <div class="s" style="box-shadow:0 2px 8px rgba(0,0,0,0.06);"><div class="nm">Card</div><div class="v">0 2px 8 / 6%</div></div>
    <div class="s" style="box-shadow:0 8px 24px rgba(0,0,0,0.10);"><div class="nm">Lift</div><div class="v">0 8px 24 / 10%</div></div>
  </div>
</div>
</body></html>
