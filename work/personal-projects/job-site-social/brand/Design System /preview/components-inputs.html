<!doctype html>
<html><head><meta charset="utf-8"><title>Inputs</title>
<link rel="stylesheet" href="_card.css">
<style>
  .field { display:flex; flex-direction:column; gap:6px; }
  label { font-family:var(--font-heading); font-weight:600; font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:#221E1F; }
  input, select { font-family:var(--font-body); font-size:15px; padding:12px 14px; border:1px solid #D4D4D4; border-radius:0; background:#fff; color:#221E1F; }
  input:focus, select:focus { outline:none; border-color:#221E1F; box-shadow: inset 0 0 0 1px #221E1F; }
  .err { border-color:#C0392B !important; }
  .err-msg { font-family:var(--font-body); font-size:12px; color:#C0392B; }
  .row2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
</style></head>
<body>
<div class="card" style="padding:24px;">
  <div class="row2">
    <div class="field">
      <label>Business Name</label>
      <input type="text" value="Smith HVAC Co." />
    </div>
    <div class="field">
      <label>City</label>
      <input type="text" placeholder="Franklin, TN" />
    </div>
    <div class="field">
      <label>Trade</label>
      <select><option>HVAC</option><option>Plumbing</option></select>
    </div>
    <div class="field">
      <label>Email</label>
      <input class="err" type="text" value="not-an-email" />
      <span class="err-msg">Enter a valid email address.</span>
    </div>
  </div>
</div>
</body></html>
