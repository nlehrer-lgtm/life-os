<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Jobsite Social — Website Kit (Print)</title>
<link rel="stylesheet" href="kit.css" />
<style>
  /* ============================================================
     Print styles for the Jobsite Social website kit.
     Each major section gets its own landscape page.
     ============================================================ */
  @page {
    size: 1280px 900px;  /* matches the design viewport */
    margin: 0;
  }

  html, body {
    background: #fff;
  }

  /* Force background colors and gradients to render */
  *, *::before, *::after {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
    color-adjust: exact !important;
  }

  /* Disable sticky nav (it would just float on every page weirdly) */
  nav { position: static !important; }

  /* Kill the warm gold wash radial in hero — slow renders and isn't critical */
  /* (kept; if rendering trouble, can disable) */

  /* Each section starts on its own page */
  nav { break-after: avoid; }
  section,
  footer {
    break-before: page;
    break-inside: avoid;
  }
  /* Hero stays glued to the nav (no break between them) */
  nav + section { break-before: avoid; }

  /* The sections have generous padding already; trim a touch so they fit */
  section { padding-top: 64px !important; padding-bottom: 64px !important; }

  /* Don't ever clip content */
  body, section, footer, .container { overflow: visible !important; }

  /* Hide subscribe modal in print regardless of state */
  [class*="modal"], .modal { display: none !important; }

  /* Reveal-on-scroll utility — make sure they're visible in print */
  .reveal { opacity: 1 !important; transform: none !important; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
</head>
<body>
<div id="app"></div>

<script type="text/babel" src="components-core.jsx"></script>
<script type="text/babel" src="components-sections.jsx"></script>
<script type="text/babel">
const { useState, useEffect } = React;
function App() {
  // Modal always closed in print
  const [plan] = useState('premium');
  const noop = () => {};
  return (
    <div id="top">
      <Nav onSubscribe={noop} active="pricing" />
      <Hero onSubscribe={noop} />
      <StatBar />
      <HowItWorks />
      <Pricing selected={plan} onSelect={noop} onSubscribe={noop} />
      <Testimonials />
      <Contact onSubscribe={noop} />
      <Footer />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('app')).render(<App />);

// ---- Auto-print after fonts + render + lucide icons are ready ----
(async function autoPrint() {
  // Wait for webfonts to load
  try { await document.fonts.ready; } catch (e) {}
  // Give React + Babel time to mount and Lucide to paint icons
  await new Promise(r => setTimeout(r, 800));
  // One more tick for layout settle
  await new Promise(r => requestAnimationFrame(r));
  window.print();
})();
</script>
</body>
</html>
