<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Jobsite Social — Website Kit</title>
<link rel="stylesheet" href="kit.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
</head>
<body>
<div id="app"></div>
<script type="text/babel" src="components-core.jsx"></script>
<script type="text/babel" src="components-sections.jsx"></script>
<script type="text/babel">
const { useState } = React;
function App() {
  const [modal, setModal] = useState(false);
  const [plan, setPlan] = useState('premium');
  const openSubscribe = () => setModal(true);
  return (
    <div id="top">
      <Nav onSubscribe={openSubscribe} active="pricing" />
      <Hero onSubscribe={openSubscribe} />
      <StatBar />
      <HowItWorks />
      <Pricing selected={plan} onSelect={setPlan} onSubscribe={openSubscribe} />
      <Testimonials />
      <Contact onSubscribe={openSubscribe} />
      <Footer />
      <SubscribeModal open={modal} onClose={() => setModal(false)} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
