<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" role="img" aria-label="Jobsite Social">
  <title>Jobsite Social — Horizontal Color</title>
  <defs>
    <style>
      .yellow { fill: #FEBD17; }
      .black  { fill: #1A1A1A; }
      .word { font-family: "Anton", "Oswald", "Arial Black", "Helvetica Neue", sans-serif; font-weight: 400; letter-spacing: 0.02em; }
    </style>
  </defs>

  <!-- Top-left yellow camera bracket -->
  <g class="yellow">
    <rect x="270" y="120" width="28" height="180"/>
    <rect x="270" y="120" width="100" height="28"/>
  </g>

  <!-- Wordmark -->
  <g class="word" font-size="220" text-anchor="middle" dominant-baseline="middle">
    <text x="600" y="220">
      <tspan class="black">JOBSITE </tspan><tspan class="yellow">SOCIAL</tspan>
    </text>
  </g>

  <!-- Bottom-right black camera bracket -->
  <g class="black">
    <rect x="902" y="252" width="28" height="180"/>
    <rect x="830" y="404" width="100" height="28"/>
  </g>
</svg>
