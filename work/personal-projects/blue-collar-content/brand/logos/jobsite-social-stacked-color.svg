<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Jobsite Social">
  <title>Jobsite Social — Stacked Color</title>
  <defs>
    <style>
      .yellow { fill: #FEBD17; }
      .black  { fill: #1A1A1A; }
      .word { font-family: "Anton", "Oswald", "Arial Black", "Helvetica Neue", sans-serif; font-weight: 400; letter-spacing: 0.02em; }
    </style>
  </defs>

  <!-- Top-left yellow bracket -->
  <g class="yellow">
    <rect x="130" y="120" width="28" height="160"/>
    <rect x="130" y="120" width="100" height="28"/>
  </g>

  <!-- Stacked wordmark -->
  <g class="word" font-size="200" text-anchor="middle" dominant-baseline="middle">
    <text x="400" y="240" class="black">JOBSITE</text>
    <text x="400" y="400" class="yellow">SOCIAL</text>
  </g>

  <!-- Bottom-right black bracket -->
  <g class="black">
    <rect x="642" y="320" width="28" height="160"/>
    <rect x="570" y="452" width="100" height="28"/>
  </g>
</svg>
