<svg width="100%" viewBox="0 0 680 480" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Flywheel with Working Genius: how Lindy makes her leader's job easier</title>
<desc>A flywheel. The hub is Lindy's engine: her geniuses D and E, and a note that it does not run on her frustrations G and I. Three tool stations sit around the wheel, each tagged with the genius it runs on: Picture over Pieces runs on Enablement (E); Steady over Flooded runs on Discernment (D); Private over Public runs on Discernment (D). Clockwise arrows chain the tools into one spinning system with spokes to the hub. The wheel throws off one payoff: clarity early, calm always — work comes off the leader's plate, he's freed for vision, the team levels up. A legend explains that E and D are the genius each tool runs on and G and I are the frustrations it routes around.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<style>
  text{font-family:'Marker Felt','Chalkboard SE','Comic Sans MS','Segoe Print',cursive;}
  .ttl{font-size:18px;font-weight:600;fill:#29292b}
  .leg{font-size:10px;fill:#8a8a82}
  .desc{font-size:10.5px;fill:#8a8a82}
  .tool{font-size:15px;font-weight:600;fill:#29292b}
  .rom{font-size:8px;font-weight:700;fill:#ffffff}
  .gp{font-size:11px;font-weight:700;fill:#ffffff}
  .gen{font-size:18px;font-weight:600;fill:#245ea6}
  .eng{font-size:10px;fill:#5f7fa6}
  .fru{font-size:9.5px;font-weight:600;fill:#c0473a}
  .ban{font-size:18px;font-weight:700;fill:#2c8a52}
  .pay{font-size:10.5px;fill:#2c8a52}
  .cor{fill:#c0473a}
  .mk{fill:none;stroke-linecap:round;stroke-linejoin:round}
</style>

<rect x="12" y="12" width="656" height="456" rx="16" fill="#fbfbf8" stroke="#c4c8cb" stroke-width="6"/>
<rect x="18" y="18" width="644" height="444" rx="12" fill="none" stroke="#e6e8e9" stroke-width="1.2"/>

<text class="ttl" x="340" y="40" text-anchor="middle">What does it mean to make my leader's job easier?</text>
<path class="mk" d="M110,52 C 230,48 340,57 440,51 S 558,50 572,54" stroke="#c8861f" stroke-width="2.4"/>

<!-- SPOKES -->
<path class="mk" d="M340,194 L340,129" stroke="#dad9d0" stroke-width="1.4"/>
<path class="mk" d="M378,260 L392,286" stroke="#dad9d0" stroke-width="1.4"/>
<path class="mk" d="M302,260 L288,286" stroke="#dad9d0" stroke-width="1.4"/>

<!-- RIM: clockwise arrows chaining the three tools -->
<path class="mk" d="M410,128 C 470,150 502,222 470,276" stroke="#3a3a36" stroke-width="3.2" marker-end="url(#arrow)"/>
<path class="mk" d="M446,340 C 420,396 262,396 234,340" stroke="#3a3a36" stroke-width="3.2" marker-end="url(#arrow)"/>
<path class="mk" d="M208,276 C 176,220 198,150 270,124" stroke="#3a3a36" stroke-width="3.2" marker-end="url(#arrow)"/>

<!-- HUB: the engine = her genius, not her frustrations -->
<circle cx="340" cy="238" r="49" fill="none" stroke="#245ea6" stroke-width="1" opacity="0.4"/>
<circle cx="340" cy="238" r="44" fill="#f1f6fc" stroke="#245ea6" stroke-width="2.4"/>
<text class="eng" x="340" y="229" text-anchor="middle">YOUR ENGINE</text>
<text class="gen" x="340" y="251" text-anchor="middle">D · E</text>
<text class="fru" x="340" y="299" text-anchor="middle">✗ not your G · I</text>

<!-- TOOL I (top) — runs on Enablement -->
<rect x="267" y="69" width="146" height="60" rx="11" fill="#fdfdfb" stroke="#245ea6" stroke-width="2"/>
<circle cx="284" cy="85" r="8" fill="#b9b9b2"/><text class="rom" x="284" y="88" text-anchor="middle">I</text>
<rect x="377" y="78" width="26" height="15" rx="7" fill="#245ea6"/><text class="gp" x="390" y="89" text-anchor="middle">E</text>
<text class="tool" x="340" y="108" text-anchor="middle">Picture <tspan class="cor">&gt;</tspan> Pieces</text>
<text class="desc" x="340" y="122" text-anchor="middle">clarity early</text>

<!-- TOOL II (lower right) — runs on Discernment -->
<rect x="388" y="279" width="146" height="60" rx="11" fill="#fdfdfb" stroke="#2c8a52" stroke-width="2"/>
<circle cx="405" cy="295" r="8" fill="#b9b9b2"/><text class="rom" x="405" y="298" text-anchor="middle">II</text>
<rect x="498" y="288" width="26" height="15" rx="7" fill="#245ea6"/><text class="gp" x="511" y="299" text-anchor="middle">D</text>
<text class="tool" x="461" y="318" text-anchor="middle">Steady <tspan class="cor">&gt;</tspan> Flooded</text>
<text class="desc" x="461" y="332" text-anchor="middle">calm in the heat</text>

<!-- TOOL III (lower left) — runs on Discernment -->
<rect x="146" y="279" width="146" height="60" rx="11" fill="#fdfdfb" stroke="#c0473a" stroke-width="2"/>
<circle cx="163" cy="295" r="8" fill="#b9b9b2"/><text class="rom" x="163" y="298" text-anchor="middle">III</text>
<rect x="256" y="288" width="26" height="15" rx="7" fill="#245ea6"/><text class="gp" x="269" y="299" text-anchor="middle">D</text>
<text class="tool" x="219" y="318" text-anchor="middle">Private <tspan class="cor">&gt;</tspan> Public</text>
<text class="desc" x="219" y="332" text-anchor="middle">to me first</text>

<!-- OUTPUT -->
<path class="mk" d="M340,398 L340,411" stroke="#2c8a52" stroke-width="3" marker-end="url(#arrow)"/>

<!-- PAYOFF -->
<path class="mk" d="M158,416 C 280,411 400,412 522,416 C 530,426 531,444 528,450 C 400,455 280,454 158,452 C 151,442 150,426 158,416 Z" fill="#eef7f0" stroke="#2c8a52" stroke-width="2.6"/>
<text class="ban" x="340" y="437" text-anchor="middle">Clarity early.  Calm always.</text>
<text class="pay" x="340" y="451" text-anchor="middle">work comes off my plate · I'm freed for vision · the team levels up</text>

<text class="leg" x="340" y="462" text-anchor="middle">E / D = the genius each tool runs on    ·    ✗ G · I = the frustrations the wheel routes around</text>
</svg>
