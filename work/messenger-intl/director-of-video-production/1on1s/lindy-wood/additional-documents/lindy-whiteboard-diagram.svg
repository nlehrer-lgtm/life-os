<svg width="100%" viewBox="0 0 680 480" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Flywheel: how Lindy makes her leader's job easier</title>
<desc>A flywheel. At the hub is Lindy's engine, D and E. Three tool stations sit around the wheel — Picture over Pieces (clarity early), Steady over Flooded (calm in the heat), Private over Public (to me first) — chained by clockwise arrows so they work as one spinning system, with spokes joining each tool to the hub. The wheel throws off one payoff at the bottom: clarity early, calm always — work comes off the leader's plate, he's freed for vision, and the whole team levels up.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<style>
  text{font-family:'Marker Felt','Chalkboard SE','Comic Sans MS','Segoe Print',cursive;}
  .ttl{font-size:18px;font-weight:600;fill:#29292b}
  .sub{font-size:12.5px;fill:#8a8a82}
  .tag{font-size:10.5px;font-weight:600}
  .tool{font-size:15px;font-weight:600;fill:#29292b}
  .badge{font-size:10px;font-weight:700;fill:#ffffff}
  .gen{font-size:18px;font-weight:600;fill:#245ea6}
  .eng{font-size:10.5px;fill:#5f7fa6}
  .ban{font-size:18px;font-weight:700;fill:#2c8a52}
  .pay{font-size:10.5px;fill:#2c8a52}
  .blu{fill:#245ea6}.grn{fill:#2c8a52}.cor{fill:#c0473a}
  .mk{fill:none;stroke-linecap:round;stroke-linejoin:round}
</style>

<rect x="12" y="12" width="656" height="456" rx="16" fill="#fbfbf8" stroke="#c4c8cb" stroke-width="6"/>
<rect x="18" y="18" width="644" height="444" rx="12" fill="none" stroke="#e6e8e9" stroke-width="1.2"/>

<text class="ttl" x="340" y="40" text-anchor="middle">What does it mean to make my leader's job easier?</text>
<path class="mk" d="M110,52 C 230,48 340,57 440,51 S 558,50 572,54" stroke="#c8861f" stroke-width="2.4"/>

<!-- SPOKES -->
<path class="mk" d="M340,194 L340,127" stroke="#dad9d0" stroke-width="1.4"/>
<path class="mk" d="M378,260 L392,286" stroke="#dad9d0" stroke-width="1.4"/>
<path class="mk" d="M302,260 L288,286" stroke="#dad9d0" stroke-width="1.4"/>

<!-- RIM: clockwise arrows chaining the three tools -->
<path class="mk" d="M410,128 C 470,150 502,222 470,276" stroke="#3a3a36" stroke-width="3.2" marker-end="url(#arrow)"/>
<path class="mk" d="M446,340 C 420,396 262,396 234,340" stroke="#3a3a36" stroke-width="3.2" marker-end="url(#arrow)"/>
<path class="mk" d="M208,276 C 176,220 198,150 270,124" stroke="#3a3a36" stroke-width="3.2" marker-end="url(#arrow)"/>

<!-- HUB: the engine -->
<circle cx="340" cy="238" r="49" fill="none" stroke="#245ea6" stroke-width="1" opacity="0.4"/>
<circle cx="340" cy="238" r="44" fill="#f1f6fc" stroke="#245ea6" stroke-width="2.4"/>
<text class="eng" x="340" y="227" text-anchor="middle">YOUR ENGINE</text>
<text class="gen" x="340" y="249" text-anchor="middle">D · E</text>
<text class="eng" x="340" y="266" text-anchor="middle">powers all 3</text>

<!-- TOOL I (top) -->
<rect x="267" y="69" width="146" height="58" rx="11" fill="#fdfdfb" stroke="#245ea6" stroke-width="2"/>
<circle cx="284" cy="87" r="9" fill="#245ea6"/><text class="badge" x="284" y="90.5" text-anchor="middle">I</text>
<text class="tag blu" x="298" y="90">WHAT · clarity early</text>
<text class="tool" x="340" y="116" text-anchor="middle">Picture <tspan class="cor">&gt;</tspan> Pieces</text>

<!-- TOOL II (lower right) -->
<rect x="388" y="279" width="146" height="58" rx="11" fill="#fdfdfb" stroke="#2c8a52" stroke-width="2"/>
<circle cx="405" cy="297" r="9" fill="#2c8a52"/><text class="badge" x="405" y="300.5" text-anchor="middle">II</text>
<text class="tag grn" x="419" y="300">HOW · calm in the heat</text>
<text class="tool" x="461" y="326" text-anchor="middle">Steady <tspan class="cor">&gt;</tspan> Flooded</text>

<!-- TOOL III (lower left) -->
<rect x="146" y="279" width="146" height="58" rx="11" fill="#fdfdfb" stroke="#c0473a" stroke-width="2"/>
<circle cx="163" cy="297" r="9" fill="#c0473a"/><text class="badge" x="163" y="300.5" text-anchor="middle">III</text>
<text class="tag cor" x="177" y="300">WHERE · to me first</text>
<text class="tool" x="219" y="326" text-anchor="middle">Private <tspan class="cor">&gt;</tspan> Public</text>

<!-- OUTPUT -->
<path class="mk" d="M340,396 L340,409" stroke="#2c8a52" stroke-width="3" marker-end="url(#arrow)"/>

<!-- PAYOFF -->
<path class="mk" d="M158,414 C 280,409 400,410 522,414 C 530,424 531,442 528,448 C 400,453 280,452 158,450 C 151,440 150,424 158,414 Z" fill="#eef7f0" stroke="#2c8a52" stroke-width="2.6"/>
<text class="ban" x="340" y="435" text-anchor="middle">Clarity early.  Calm always.</text>
<text class="pay" x="340" y="449" text-anchor="middle">work comes off my plate · I'm freed for vision · the team levels up</text>

<text class="sub" x="340" y="461" text-anchor="middle">a working framework — for Lindy, from Nathaniel</text>
</svg>
