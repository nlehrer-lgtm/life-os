<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1010 730" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="1010" height="730" fill="#f7f6f1"/>
  <rect x="12" y="12" width="986" height="706" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>

  <rect x="12" y="12" width="986" height="56" fill="#1a1a1a"/>
  <text x="34" y="40" fill="#f7f6f1" font-size="22" font-weight="700" letter-spacing="1">FIGURE 2 — STAGE MAP &amp; BUILD ORDER (TOP VIEW)</text>
  <text x="34" y="60" fill="#cfcfcf" font-size="13">15 panels · 20' wide · 12' deep center / 9' wing · scale 1' = 40px · audience at bottom</text>

  <!-- LED wall arc (green) -->
  <polyline points="90,232 200,170 280,138.7 360,117 440,104.4 520,100 600,104.4 680,117 760,138.7 840,170 950,232"
            fill="none" stroke="#2ecc71" stroke-width="7" stroke-linecap="round"/>
  <text x="520" y="86" font-size="13" font-weight="700" fill="#1a8a4a" text-anchor="middle">CURVED LED WALL</text>

  <!-- stage outline -->
  <path d="M 120 620 L 120 260
           L 120 260
           L 200 214.3 L 280 180.8 L 360 157.8 L 440 144.4 L 520 140 L 600 144.4 L 680 157.8 L 760 180.8 L 840 214.3 L 920 260
           L 920 620 Z"
        fill="#3a3a3a" fill-opacity="0.10" stroke="#1a1a1a" stroke-width="3"/>

  <!-- 12 inch gap annotation -->
  <line x1="520" y1="140" x2="520" y2="100" stroke="#e74c3c" stroke-width="1.2" stroke-dasharray="3,2"/>
  <text x="530" y="126" font-size="11" fill="#c0392b">12" gap (keep even along the whole curve)</text>

  <!-- column dividers (up to the curve) -->
  <g stroke="#888" stroke-width="1" stroke-dasharray="5,3">
    <line x1="280" y1="620" x2="280" y2="180.8"/>
    <line x1="440" y1="620" x2="440" y2="144.4"/>
    <line x1="600" y1="620" x2="600" y2="144.4"/>
    <line x1="760" y1="620" x2="760" y2="180.8"/>
  </g>
  <!-- row dividers -->
  <g stroke="#888" stroke-width="1" stroke-dasharray="5,3">
    <line x1="120" y1="460" x2="920" y2="460"/>
    <line x1="120" y1="300" x2="920" y2="300"/>
  </g>

  <!-- panel labels + build-order numbers -->
  <g font-size="17" font-weight="700" fill="#1a1a1a" text-anchor="middle">
    <text x="200" y="546">A1</text><text x="360" y="546">B1</text><text x="520" y="546">C1</text><text x="680" y="546">D1</text><text x="840" y="546">E1</text>
    <text x="200" y="386">A2</text><text x="360" y="386">B2</text><text x="520" y="386">C2</text><text x="680" y="386">D2</text><text x="840" y="386">E2</text>
    <text x="200" y="272" fill="#c0392b">A3</text><text x="360" y="255" fill="#c0392b">B3</text><text x="520" y="240" fill="#c0392b">C3</text><text x="680" y="255" fill="#c0392b">D3</text><text x="840" y="272" fill="#c0392b">E3</text>
  </g>
  <!-- build order circles -->
  <g>
    <g fill="#1a1a1a"><circle cx="520" cy="512" r="13"/><circle cx="360" cy="512" r="13"/><circle cx="680" cy="512" r="13"/><circle cx="200" cy="512" r="13"/><circle cx="840" cy="512" r="13"/>
       <circle cx="520" cy="352" r="13"/><circle cx="360" cy="352" r="13"/><circle cx="680" cy="352" r="13"/><circle cx="200" cy="352" r="13"/><circle cx="840" cy="352" r="13"/>
       <circle cx="520" cy="210" r="13"/><circle cx="360" cy="222" r="13"/><circle cx="680" cy="222" r="13"/><circle cx="200" cy="240" r="13"/><circle cx="840" cy="240" r="13"/></g>
    <g fill="#f7f6f1" font-size="13" font-weight="700" text-anchor="middle">
      <text x="520" y="517">1</text><text x="360" y="517">2</text><text x="680" y="517">3</text><text x="200" y="517">4</text><text x="840" y="517">5</text>
      <text x="520" y="357">6</text><text x="360" y="357">7</text><text x="680" y="357">8</text><text x="200" y="357">9</text><text x="840" y="357">10</text>
      <text x="520" y="215">11</text><text x="360" y="227">12</text><text x="680" y="227">13</text><text x="200" y="245">14</text><text x="840" y="245">15</text>
    </g>
  </g>
  <text x="520" y="300" font-size="11" fill="#c0392b" text-anchor="middle">⬑ Row 3 (red) = curved back edge ⬑</text>

  <!-- ===== DIMENSIONS ===== -->
  <!-- width 20' bottom -->
  <g stroke="#1a1a1a" stroke-width="0.7" fill="none">
    <line x1="120" y1="640" x2="120" y2="665"/>
    <line x1="920" y1="640" x2="920" y2="665"/>
    <line x1="120" y1="655" x2="920" y2="655"/>
    <polygon points="120,655 132,651 132,659" fill="#1a1a1a"/>
    <polygon points="920,655 908,651 908,659" fill="#1a1a1a"/>
  </g>
  <text x="520" y="650" font-size="14" font-weight="700" text-anchor="middle">20'-0" — STAGE WIDTH (5 panels)</text>

  <!-- depth center 12' left -->
  <g stroke="#1a1a1a" stroke-width="0.7" fill="none">
    <line x1="95" y1="140" x2="72" y2="140"/>
    <line x1="95" y1="620" x2="72" y2="620"/>
    <line x1="84" y1="140" x2="84" y2="620"/>
    <polygon points="84,140 80,152 88,152" fill="#1a1a1a"/>
    <polygon points="84,620 80,608 88,608" fill="#1a1a1a"/>
  </g>
  <text x="76" y="380" font-size="13" font-weight="700" text-anchor="middle" transform="rotate(-90,76,380)">12'-0" DEPTH @ CENTER</text>

  <!-- depth wing 9' right -->
  <g stroke="#1a1a1a" stroke-width="0.7" fill="none">
    <line x1="936" y1="260" x2="958" y2="260"/>
    <line x1="936" y1="620" x2="958" y2="620"/>
    <line x1="947" y1="260" x2="947" y2="620"/>
    <polygon points="947,260 943,272 951,272" fill="#1a1a1a"/>
    <polygon points="947,620 943,608 951,608" fill="#1a1a1a"/>
  </g>
  <text x="955" y="440" font-size="12" font-weight="700" text-anchor="middle" transform="rotate(90,955,440)">9'-0" @ WING</text>

  <!-- orientation -->
  <text x="520" y="700" font-size="13" font-weight="700" text-anchor="middle" fill="#1a1a1a">▼ AUDIENCE / DOWNSTAGE ▼</text>
  <text x="150" y="700" font-size="11" fill="#666">SR (stage right)</text>
  <text x="820" y="700" font-size="11" fill="#666">SL (stage left)</text>

  <text x="34" y="700" font-size="11" fill="#666" font-style="italic">Place &amp; bolt in number order:</text>
</svg>
