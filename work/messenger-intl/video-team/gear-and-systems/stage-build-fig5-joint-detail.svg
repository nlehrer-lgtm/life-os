<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 580" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="820" height="580" fill="#f7f6f1"/>
  <rect x="12" y="12" width="796" height="556" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>

  <rect x="12" y="12" width="796" height="56" fill="#1a1a1a"/>
  <text x="34" y="40" fill="#f7f6f1" font-size="22" font-weight="700" letter-spacing="1">FIGURE 5 — HOW PANELS BOLT TOGETHER</text>
  <text x="34" y="60" fill="#cfcfcf" font-size="13">Cut-through of one seam · scale 1" = 40px</text>

  <!-- two rails -->
  <rect x="330" y="200" width="60" height="220" fill="#d4a574" stroke="#8b5a2b" stroke-width="1.2"/>
  <rect x="390" y="200" width="60" height="220" fill="#d4a574" stroke="#8b5a2b" stroke-width="1.2"/>
  <!-- seam line -->
  <line x1="390" y1="160" x2="390" y2="420" stroke="#8b5a2b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="390" y="440" font-size="11" fill="#8b5a2b" text-anchor="middle">seam (two panels' rails, face-to-face)</text>

  <!-- decks -->
  <rect x="330" y="170" width="120" height="30" fill="#e8c896" stroke="#8b5a2b" stroke-width="1"/>
  <rect x="330" y="160" width="120" height="10" fill="#1a1a1a"/>
  <text x="468" y="183" font-size="10" fill="#5a3a1a">¾" deck</text>
  <text x="468" y="168" font-size="10" fill="#1a1a1a">¼" top</text>

  <!-- dowel pin near top -->
  <rect x="350" y="231" width="80" height="10" rx="5" fill="#9b6b3a" stroke="#5a3a1a" stroke-width="1"/>
  <line x1="390" y1="231" x2="390" y2="241" stroke="#5a3a1a" stroke-width="0.8" stroke-dasharray="2,2"/>
  <text x="300" y="238" font-size="12" font-weight="700" fill="#5a3a1a" text-anchor="end">¼" × 2" dowel pin →</text>
  <text x="455" y="225" font-size="11" fill="#666">keeps tops flush</text>

  <!-- carriage bolt -->
  <!-- shaft -->
  <rect x="330" y="321" width="150" height="8" fill="#555"/>
  <!-- threads (right portion) -->
  <g stroke="#333" stroke-width="1">
    <line x1="452" y1="319" x2="452" y2="331"/>
    <line x1="458" y1="319" x2="458" y2="331"/>
    <line x1="464" y1="319" x2="464" y2="331"/>
    <line x1="470" y1="319" x2="470" y2="331"/>
    <line x1="476" y1="319" x2="476" y2="331"/>
  </g>
  <!-- round head (left) -->
  <path d="M 330 311 A 14 14 0 0 0 330 339 Z" fill="#444"/>
  <!-- square shoulder under head -->
  <rect x="330" y="318" width="14" height="14" fill="#333"/>
  <!-- washer (right face) -->
  <rect x="450" y="312" width="6" height="26" fill="#777" stroke="#444" stroke-width="0.6"/>
  <!-- wing nut -->
  <ellipse cx="468" cy="325" rx="10" ry="9" fill="#888" stroke="#555" stroke-width="0.8"/>
  <path d="M 468 320 Q 452 305 450 320 Q 458 326 468 325" fill="#999" stroke="#555" stroke-width="0.6"/>
  <path d="M 468 330 Q 452 345 450 330 Q 458 324 468 325" fill="#999" stroke="#555" stroke-width="0.6"/>

  <!-- bolt labels -->
  <text x="316" y="300" font-size="12" font-weight="700" fill="#1a1a1a" text-anchor="end">round head →</text>
  <text x="300" y="360" font-size="12" font-weight="700" fill="#1a1a1a" text-anchor="end">⅜" × 4" carriage bolt</text>
  <line x1="305" y1="356" x2="360" y2="328" stroke="#1a1a1a" stroke-width="0.5"/>
  <text x="500" y="320" font-size="12" font-weight="700" fill="#1a1a1a">← washer + wing nut</text>
  <text x="500" y="336" font-size="11" fill="#666">snug with a wrench</text>
  <text x="330" y="470" font-size="11" fill="#666">The square shoulder under the head bites the wood so the bolt won't spin while you tighten.</text>

  <!-- ===== spacing strip ===== -->
  <text x="34" y="500" font-size="13" font-weight="700" fill="#1a1a1a">Bolt spacing along a 48" seam:  6" from each end, every 12" between = 4 bolts.</text>
  <rect x="170" y="515" width="480" height="22" fill="#d4a574" stroke="#8b5a2b" stroke-width="1"/>
  <g fill="#444">
    <circle cx="230" cy="526" r="6"/><circle cx="350" cy="526" r="6"/><circle cx="470" cy="526" r="6"/><circle cx="590" cy="526" r="6"/>
  </g>
  <g stroke="#1a1a1a" stroke-width="0.6" fill="#1a1a1a" font-size="10" text-anchor="middle">
    <text x="200" y="555">6"</text>
    <text x="290" y="555">12"</text>
    <text x="410" y="555">12"</text>
    <text x="530" y="555">12"</text>
    <text x="620" y="555">6"</text>
  </g>
  <g stroke="#888" stroke-width="0.5">
    <line x1="170" y1="540" x2="170" y2="550"/><line x1="230" y1="532" x2="230" y2="550"/>
    <line x1="350" y1="532" x2="350" y2="550"/><line x1="470" y1="532" x2="470" y2="550"/>
    <line x1="590" y1="532" x2="590" y2="550"/><line x1="650" y1="540" x2="650" y2="550"/>
  </g>
</svg>
