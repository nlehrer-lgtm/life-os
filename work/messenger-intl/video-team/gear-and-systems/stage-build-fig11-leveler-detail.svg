<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 872 640" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="met" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#6f6f6f"/><stop offset="35%" stop-color="#cfcfcf"/>
      <stop offset="60%" stop-color="#a0a0a0"/><stop offset="100%" stop-color="#5f5f5f"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#c89a63"/><stop offset="50%" stop-color="#dcb789"/><stop offset="100%" stop-color="#bb8a52"/>
    </linearGradient>
    <linearGradient id="wood2" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#bb8a52"/><stop offset="100%" stop-color="#a87c46"/>
    </linearGradient>
    <radialGradient id="foot" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#e2e2e2"/><stop offset="100%" stop-color="#707070"/>
    </radialGradient>
    <pattern id="conc" patternUnits="userSpaceOnUse" width="16" height="16">
      <rect width="16" height="16" fill="#cccccc"/>
      <circle cx="4" cy="5" r="1.1" fill="#9a9a9a"/><circle cx="11" cy="10" r="1.3" fill="#aeaeae"/><circle cx="8" cy="13" r="0.9" fill="#8c8c8c"/>
    </pattern>
  </defs>

  <rect x="0" y="0" width="800" height="640" fill="#f7f6f1"/>
  <rect x="12" y="12" width="776" height="56" fill="#1a1a1a"/>
  <text x="30" y="40" fill="#f7f6f1" font-size="21" font-weight="700" letter-spacing="1">FIGURE 11 — LEVELER FOOT (CLOSE-UP, CUT-THROUGH)</text>
  <text x="30" y="58" fill="#cfcfcf" font-size="12.5">One of 4 per panel · threads into a doubled 2x6 corner block · turn to level</text>

  <!-- concrete floor -->
  <rect x="120" y="520" width="560" height="76" fill="url(#conc)" stroke="#777" stroke-width="0.6"/>
  <text x="135" y="566" font-size="12" fill="#444" font-weight="700">CONCRETE STUDIO FLOOR</text>

  <!-- deck: masonite + ply on top -->
  <rect x="250" y="118" width="300" height="14" fill="#1a1a1a"/>
  <rect x="250" y="132" width="300" height="40" fill="url(#wood)" stroke="#8b5a2b" stroke-width="0.8"/>

  <!-- 2x6 rail + corner block (5.5" tall) -->
  <rect x="250" y="172" width="300" height="270" fill="url(#wood)" stroke="#8b5a2b" stroke-width="1"/>
  <!-- doubling line: rail | corner block -->
  <line x1="400" y1="172" x2="400" y2="442" stroke="#8b5a2b" stroke-width="1.2" stroke-dasharray="6,4"/>
  <rect x="400" y="172" width="150" height="270" fill="url(#wood2)" opacity="0.55"/>
  <text x="325" y="312" font-size="12" font-weight="700" fill="#5a3a1a" text-anchor="middle">2x6 frame rail</text>
  <text x="475" y="305" font-size="11" font-weight="700" fill="#5a3a1a" text-anchor="middle">corner</text>
  <text x="475" y="319" font-size="11" font-weight="700" fill="#5a3a1a" text-anchor="middle">block</text>

  <!-- T-nut in bottom of block -->
  <rect x="452" y="430" width="46" height="12" fill="url(#met)" stroke="#555" stroke-width="0.7"/>
  <rect x="468" y="400" width="14" height="42" fill="#888" stroke="#555" stroke-width="0.5"/>
  <rect x="448" y="440" width="54" height="5" fill="#666"/>

  <!-- leveler stud (threaded) -->
  <rect x="466" y="442" width="18" height="60" fill="url(#met)" stroke="#555" stroke-width="0.6"/>
  <!-- thread marks -->
  <g stroke="#4f4f4f" stroke-width="1">
    <line x1="466" y1="450" x2="484" y2="454"/><line x1="466" y1="458" x2="484" y2="462"/>
    <line x1="466" y1="466" x2="484" y2="470"/><line x1="466" y1="474" x2="484" y2="478"/>
    <line x1="466" y1="482" x2="484" y2="486"/><line x1="466" y1="490" x2="484" y2="494"/>
  </g>

  <!-- foot pad + swivel -->
  <ellipse cx="475" cy="503" rx="40" ry="9" fill="url(#foot)" stroke="#555" stroke-width="0.8"/>
  <rect x="435" y="503" width="80" height="12" fill="url(#met)" stroke="#555" stroke-width="0.7"/>
  <ellipse cx="475" cy="515" rx="40" ry="8" fill="#6f6f6f"/>
  <!-- non-slip pad -->
  <ellipse cx="475" cy="520" rx="40" ry="7" fill="#2b2b2b"/>

  <!-- adjustment dimension (left of stud) -->
  <g stroke="#c0392b" stroke-width="0.9" fill="none">
    <line x1="432" y1="442" x2="432" y2="503"/>
    <polygon points="432,442 428,454 436,454" fill="#c0392b"/>
    <polygon points="432,503 428,491 436,491" fill="#c0392b"/>
  </g>
  <text x="426" y="478" font-size="12.5" font-weight="700" fill="#c0392b" text-anchor="end">½"–1½"</text>
  <text x="426" y="492" font-size="11" fill="#c0392b" text-anchor="end">adjust</text>

  <!-- ===== callouts (right) ===== -->
  <g font-size="13" fill="#1a1a1a">
    <line x1="550" y1="125" x2="640" y2="125" stroke="#1a1a1a" stroke-width="0.6"/>
    <text x="646" y="122" font-weight="700">¼" Masonite + ¾" ply deck</text>
    <text x="646" y="138" fill="#666" font-size="11">(the walking surface)</text>

    <line x1="550" y1="300" x2="640" y2="300" stroke="#1a1a1a" stroke-width="0.6"/>
    <text x="646" y="297" font-weight="700">2x6 corner block</text>
    <text x="646" y="313" fill="#666" font-size="11">doubled for solid threading</text>

    <line x1="498" y1="436" x2="640" y2="392" stroke="#1a1a1a" stroke-width="0.6"/>
    <text x="646" y="390" font-weight="700">T-nut / threaded insert</text>
    <text x="646" y="406" fill="#666" font-size="11">(comes with the foot)</text>

    <line x1="484" y1="470" x2="640" y2="470" stroke="#1a1a1a" stroke-width="0.6"/>
    <text x="646" y="467" font-weight="700">¾" threaded stud</text>

    <line x1="515" y1="508" x2="640" y2="520" stroke="#1a1a1a" stroke-width="0.6"/>
    <text x="646" y="518" font-weight="700">swivel foot pad</text>

    <line x1="515" y1="520" x2="640" y2="556" stroke="#1a1a1a" stroke-width="0.6"/>
    <text x="646" y="558" font-weight="700">non-slip rubber pad</text>
    <text x="646" y="574" fill="#666" font-size="11">(optional)</text>
  </g>

  <text x="30" y="620" font-size="11.5" fill="#666" font-style="italic">To level the stage: turn each foot up or down until the whole top is flat, then re-snug the panel bolts. Start from the highest corner.</text>
</svg>
