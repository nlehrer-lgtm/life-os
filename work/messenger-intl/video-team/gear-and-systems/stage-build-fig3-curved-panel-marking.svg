<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 800" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="880" height="800" fill="#f7f6f1"/>
  <rect x="12" y="12" width="856" height="776" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>

  <rect x="12" y="12" width="856" height="56" fill="#1a1a1a"/>
  <text x="34" y="40" fill="#f7f6f1" font-size="22" font-weight="700" letter-spacing="1">FIGURE 4 — MARKING THE CURVE (PANEL B3 SHOWN)</text>
  <text x="34" y="60" fill="#cfcfcf" font-size="13">Dot-and-batten method · scale 1" = 10px · D3 is the mirror</text>

  <!-- blank panel 48x48 : x160-640 y150-630 -->
  <rect x="160" y="150" width="480" height="480" fill="#fbfaf6" stroke="#999" stroke-width="1"/>

  <!-- KEEP region (below curve) -->
  <path d="M 160 163.1 L 220 170.6 L 280 180.0 L 340 190.6 L 400 203.8 L 460 218.1 L 520 234.4 L 580 252.5 L 640 272.5 L 640 630 L 160 630 Z"
        fill="#2ecc71" fill-opacity="0.12"/>
  <!-- WASTE region (above curve) -->
  <path d="M 160 150 L 640 150 L 640 272.5 L 580 252.5 L 520 234.4 L 460 218.1 L 400 203.8 L 340 190.6 L 280 180.0 L 220 170.6 L 160 163.1 Z"
        fill="#e74c3c" fill-opacity="0.13"/>

  <!-- cable tunnel (faint) center of panel x370-430 from front up to curve -->
  <rect x="370" y="207" width="60" height="423" fill="#2980b9" fill-opacity="0.08" stroke="#2980b9" stroke-width="0.8" stroke-dasharray="5,3"/>
  <text x="400" y="500" font-size="10" fill="#2980b9" text-anchor="middle" transform="rotate(-90,400,500)">cable tunnel (stays at front)</text>

  <!-- batten cut line through the 9 dots -->
  <polyline points="160,163.1 220,170.6 280,180.0 340,190.6 400,203.8 460,218.1 520,234.4 580,252.5 640,272.5"
            fill="none" stroke="#c0392b" stroke-width="2.5"/>
  <!-- dots -->
  <g fill="#1a1a1a" stroke="#fff" stroke-width="1">
    <circle cx="160" cy="163.1" r="4.5"/>
    <circle cx="220" cy="170.6" r="4.5"/>
    <circle cx="280" cy="180.0" r="4.5"/>
    <circle cx="340" cy="190.6" r="4.5"/>
    <circle cx="400" cy="203.8" r="4.5"/>
    <circle cx="460" cy="218.1" r="4.5"/>
    <circle cx="520" cy="234.4" r="4.5"/>
    <circle cx="580" cy="252.5" r="4.5"/>
    <circle cx="640" cy="272.5" r="4.5"/>
  </g>

  <!-- region labels -->
  <text x="400" y="195" font-size="15" font-weight="700" fill="#c0392b" text-anchor="middle">CUT HERE — remove this (waste)</text>
  <text x="400" y="430" font-size="16" font-weight="700" fill="#1a8a4a" text-anchor="middle">KEEP — stage surface</text>

  <!-- front reference edge -->
  <line x1="160" y1="630" x2="640" y2="630" stroke="#1a1a1a" stroke-width="3.5"/>
  <text x="400" y="652" font-size="12" font-weight="700" text-anchor="middle">FRONT (downstage) EDGE — measure every depth UP from this line</text>

  <!-- depth arrow at u=0 (left, x=170 inset) -->
  <g stroke="#1a8a4a" stroke-width="0.8" fill="none">
    <line x1="178" y1="630" x2="178" y2="163.1"/>
    <polygon points="178,163.1 174,175 182,175" fill="#1a8a4a"/>
    <polygon points="178,630 174,618 182,618" fill="#1a8a4a"/>
  </g>
  <text x="184" y="400" font-size="12" font-weight="700" fill="#1a8a4a">u=0 : depth 46¹¹⁄₁₆"</text>

  <!-- depth arrow at u=48 (right inset x=624) -->
  <g stroke="#1a8a4a" stroke-width="0.8" fill="none">
    <line x1="622" y1="630" x2="622" y2="272.5"/>
    <polygon points="622,272.5 618,284 626,284" fill="#1a8a4a"/>
    <polygon points="622,630 618,618 626,618" fill="#1a8a4a"/>
  </g>
  <text x="616" y="460" font-size="12" font-weight="700" fill="#1a8a4a" text-anchor="end">u=48 : depth 35¾"</text>

  <!-- width dim across (u) at top -->
  <g stroke="#1a1a1a" stroke-width="0.6" fill="none">
    <line x1="160" y1="138" x2="160" y2="120"/>
    <line x1="640" y1="138" x2="640" y2="120"/>
    <line x1="160" y1="129" x2="640" y2="129"/>
    <polygon points="160,129 170,126 170,132" fill="#1a1a1a"/>
    <polygon points="640,129 630,126 630,132" fill="#1a1a1a"/>
  </g>
  <text x="400" y="125" font-size="11" font-weight="700" text-anchor="middle">48" width — u runs 0 (center side) → 48 (wing side)</text>

  <!-- ===== B3 TABLE ===== -->
  <rect x="34" y="678" width="812" height="92" fill="#fff" stroke="#1a1a1a" stroke-width="1"/>
  <text x="44" y="698" font-size="13" font-weight="700" fill="#1a1a1a">PANEL B3 — depth from front edge at each 6" mark:</text>
  <g font-size="12.5" fill="#1a1a1a">
    <text x="44"  y="724" font-weight="700">u</text>
    <text x="120" y="724">0"</text>
    <text x="200" y="724">6"</text>
    <text x="280" y="724">12"</text>
    <text x="360" y="724">18"</text>
    <text x="440" y="724">24"</text>
    <text x="520" y="724">30"</text>
    <text x="600" y="724">36"</text>
    <text x="680" y="724">42"</text>
    <text x="760" y="724">48"</text>

    <text x="44"  y="750" font-weight="700">depth</text>
    <text x="112" y="750">46¹¹⁄₁₆</text>
    <text x="192" y="750">45¹⁵⁄₁₆</text>
    <text x="280" y="750">45</text>
    <text x="352" y="750">43¹⁵⁄₁₆</text>
    <text x="434" y="750">42⅝</text>
    <text x="512" y="750">41³⁄₁₆</text>
    <text x="592" y="750">39⁹⁄₁₆</text>
    <text x="680" y="750">37¾</text>
    <text x="752" y="750">35¾</text>
  </g>
  <text x="44" y="766" font-size="10.5" fill="#666" font-style="italic">Mark all 9 dots · spring the flexible batten so it touches every dot · trace · cut with the jigsaw, then sand to the line.</text>
</svg>
