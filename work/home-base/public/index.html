<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home Base</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="bg"></div>

  <div id="app">

    <!-- ── Row 1: Header ──────────────────────────────────────────────── -->
    <div class="panel" id="panel-header">
      <div id="greeting">Good morning, Nathaniel</div>
      <div id="header-center">
        <div id="clock">12:00 PM</div>
        <div id="date-long">Friday, April 24</div>
      </div>
      <div id="header-right">
        <div id="date-sub">Day 114 of 365</div>
        <div id="refresh-dot" title="Auto-refreshing every 5 min"></div>
      </div>
    </div>

    <!-- ── Row 2: Main content ────────────────────────────────────────── -->
    <div id="content-row">

      <!-- Column 1: Gmail (top) + Slack DMs (bottom) -->
      <div id="col-1">
        <div class="panel expandable" id="panel-gmail" data-title="Gmail — Inbox">
          <div class="panel-header">
            <div class="panel-title-row">
              <span class="panel-icon">✉</span>
              <span class="panel-title">Gmail</span>
            </div>
            <span class="panel-badge" id="gmail-count">—</span>
          </div>
          <div class="panel-body" id="gmail-body">
            <div class="loading">Loading...</div>
          </div>
        </div>

        <div class="panel expandable" id="panel-slack-dms" data-title="Slack — DMs & Mentions">
          <div class="panel-header">
            <div class="panel-title-row">
              <span class="panel-icon">#</span>
              <span class="panel-title">Slack DMs</span>
            </div>
            <span class="panel-badge" id="slack-dm-count">—</span>
          </div>
          <div class="panel-body" id="slack-dms-body">
            <div class="loading">Loading...</div>
          </div>
        </div>
      </div>

      <!-- Column 2: Calendar (top) + Asana + Slack Video (bottom) -->
      <div id="col-2">
        <div class="panel expandable" id="panel-calendar" data-title="Today's Calendar">
          <div class="panel-header">
            <div class="panel-title-row">
              <span class="panel-icon">◷</span>
              <span class="panel-title">Today</span>
            </div>
            <span id="cal-event-count" class="panel-sub"></span>
          </div>
          <div class="panel-body" id="calendar-body">
            <div class="loading">Loading...</div>
          </div>
        </div>

        <div id="col-2-bottom">
          <div class="panel expandable" id="panel-asana-urgent" data-title="Asana — Most Urgent Tasks">
            <div class="panel-header">
              <div class="panel-title-row">
                <span class="panel-icon">▲</span>
                <span class="panel-title">Most Urgent</span>
              </div>
            </div>
            <div class="panel-body" id="asana-urgent-body">
              <div class="loading">Loading...</div>
            </div>
          </div>

          <div class="panel expandable" id="panel-slack-video" data-title="Slack — Video Team">
            <div class="panel-header">
              <div class="panel-title-row">
                <span class="panel-icon">▶</span>
                <span class="panel-title">Video Team</span>
              </div>
            </div>
            <div class="panel-body" id="slack-video-body">
              <div class="loading">Loading...</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Column 3: Claude Chat -->
      <div class="panel" id="panel-chat">
        <div class="panel-header">
          <div class="panel-title-row">
            <span class="panel-icon">◆</span>
            <span class="panel-title">Claude</span>
          </div>
          <span class="panel-sub">Ask anything</span>
        </div>
        <div id="chat-messages"></div>
        <div id="chat-input-row">
          <textarea id="chat-input" placeholder="Ask Claude..." rows="1"></textarea>
          <button id="chat-send" title="Send (Enter)">↑</button>
        </div>
      </div>

    </div>

    <!-- ── Row 3: Year Timeline ───────────────────────────────────────── -->
    <div class="panel" id="panel-timeline">
      <div id="timeline-label">
        <span class="panel-icon" style="font-size:11px;">⬤</span>
        <span style="font-size:10px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--accent); opacity:0.9;">2026 Road Map</span>
      </div>
      <div id="timeline-svg-container">
        <svg id="timeline-svg" viewBox="0 0 1000 52" preserveAspectRatio="xMidYMid meet"></svg>
      </div>
    </div>

    <!-- ── Row 4: Footer ─────────────────────────────────────────────── -->
    <div id="footer-row">
      <div class="panel expandable" id="panel-slack-allstaff" data-title="Slack — All Staff">
        <div class="panel-header">
          <div class="panel-title-row">
            <span class="panel-icon">#</span>
            <span class="panel-title">All Staff</span>
          </div>
        </div>
        <div class="panel-body" id="slack-allstaff-body">
          <div class="loading">Loading...</div>
        </div>
      </div>

      <div class="panel" id="panel-quote">
        <div class="panel-header">
          <div class="panel-title-row">
            <span class="panel-icon">"</span>
            <span class="panel-title">Today's Word</span>
          </div>
        </div>
        <div class="panel-body" id="quote-body">
          <div class="loading">Loading...</div>
        </div>
      </div>
    </div>

  </div>

  <!-- ── Expand Overlay ─────────────────────────────────────────────── -->
  <div id="overlay">
    <div id="overlay-panel">
      <div id="overlay-header">
        <span id="overlay-title"></span>
        <button id="overlay-close">✕</button>
      </div>
      <div id="overlay-body"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
